name: security-analysis

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL C/C++
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"

  custom-cwe:
    name: Coursework CWE analyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: extractions/setup-just@v4
      - name: Run coursework analyzer through just
        run: just analyze
      - name: Upload custom SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: analysis/custom-cwe.sarif
      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coursework-cwe-analysis
          path: |
            analysis/findings.json
            analysis/report.md
            analysis/custom-cwe.sarif
            analysis/facts/*.facts
