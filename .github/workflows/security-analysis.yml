name: security-analysis

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql-compiled:
    name: CodeQL ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            category: /language:c-cpp
          - language: java-kotlin
            category: /language:java-kotlin
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL for ${{ matrix.language }}
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis for ${{ matrix.language }}
        uses: github/codeql-action/analyze@v4
        with:
          category: ${{ matrix.category }}

  codeql-python:
    name: CodeQL python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL for python
        uses: github/codeql-action/init@v4
        with:
          languages: python
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis for python
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:python

  custom-cwe:
    name: Coursework CWE analyzer
    runs-on: ubuntu-24.04
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemma-4-31b-it' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install just
        run: |
          if ! command -v just >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y just || cargo install just
          fi
          just --version

      - name: Install Souffle from GitHub Release if available
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/install_souffle_ci.sh

      - name: Run coursework analyzer through just
        run: just analyze

      - name: Generate Gemini/Gemma report if API key is configured
        if: ${{ env.GEMINI_API_KEY != '' }}
        run: just gemini

      - name: Generate Gemma diff suggestions for classroom demo
        if: ${{ env.GEMINI_API_KEY != '' }}
        run: just repair-demo

      - name: Add CWE report to GitHub Actions summary
        if: always()
        run: |
          {
            echo "# Coursework CWE analyzer"
            echo
            echo "## Static analyzer report"
            echo
            echo "Pipeline: Python/AST/regex facts → Souffle Datalog inference if available → SARIF/Markdown. CodeQL runs in separate jobs for industrial baseline scanning."
            echo
            if [[ -f analysis/report.md ]]; then
              cat analysis/report.md
            else
              echo "_analysis/report.md was not generated._"
            fi

            echo
            echo "---"
            echo
            echo "## Gemini/Gemma assisted explanation"
            echo
            if [[ -f analysis/gemini_report.md ]]; then
              cat analysis/gemini_report.md
            elif [[ -n "${GEMINI_API_KEY:-}" ]]; then
              echo "_Gemini/Gemma report was requested but was not generated. Check the job log for API details._"
            else
              echo '_Gemini/Gemma report was skipped because repository secret `GEMINI_API_KEY` is not configured._'
              echo
              echo 'Default model when enabled: `gemma-4-31b-it`. Override with repository variable `GEMINI_MODEL`.'
            fi

            echo
            echo "---"
            echo
            echo "## Gemma diff suggestions"
            echo
            if [[ -f analysis/repair/gemma_diff_suggestions.md ]]; then
              cat analysis/repair/gemma_diff_suggestions.md
            elif [[ -n "${GEMINI_API_KEY:-}" ]]; then
              echo "_Gemma diff suggestion step was requested but no Markdown file was generated. Check the job log for API details._"
            else
              echo '_Gemma diff suggestions were skipped because repository secret `GEMINI_API_KEY` is not configured._'
              echo
              echo 'This demo mode only renders suggested unified diffs in the Actions Summary; it does not apply patches or create pull requests.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload custom SARIF to code scanning
        if: always() && hashFiles('analysis/custom-cwe.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: analysis/custom-cwe.sarif

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coursework-cwe-analysis
          path: |
            analysis/findings.json
            analysis/report.md
            analysis/gemini_report.md
            analysis/repair/gemma_diff_suggestions.md
            analysis/repair/gemma_diff_suggestions.json
            analysis/repair/suggested.patch
            analysis/custom-cwe.sarif
            analysis/datalog/finding.csv
            analysis/facts/*.facts
            analysis/facts/manifest.json
          if-no-files-found: warn
